<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Viewport — once, inside head -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- ✅ Standard favicon — Chrome, Firefox, Android -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- ✅ iOS Safari — must be apple-touch-icon to override React default -->
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/favicon.png" />

    <!-- ✅ Tab title -->
    <title>Priyanshu Gautam</title>

    <!-- ✅ SEO -->
    <meta name="description" content="Priyanshu Gautam — Computer Science student at VIT Vellore, passionate about Cybersecurity, Ethical Hacking, and building interactive web experiences." />
    <meta name="author" content="Priyanshu Gautam" />
    <meta name="keywords" content="Priyanshu Gautam, Portfolio, Cybersecurity, Ethical Hacking, VIT Vellore, React, Web Developer" />

    <!-- ✅ Open Graph — WhatsApp, LinkedIn previews -->
    <meta property="og:title" content="Priyanshu Gautam — Portfolio" />
    <meta property="og:description" content="CS Student | Cybersecurity & Ethical Hacking | VIT Vellore" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <!-- ✅ PWA / iOS home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Priyanshu" />

    <!-- ✅ Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <style>
      /*
        ✅ Applied before CSS loads
        — no overflow:hidden on html so iOS touch zoom-out works
        — body handles overflow-x only
      */
      html {
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        margin: 0;
        padding: 0;
      }
      body {
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
